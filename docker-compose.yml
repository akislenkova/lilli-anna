version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anilla
      POSTGRES_PASSWORD: anilla
      POSTGRES_DB: anilla
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anilla"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      ALLOW_STAFF_SELF_REGISTRATION: "true"
      DATABASE_URL: postgresql://anilla:anilla@db:5432/anilla
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in your .env file}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:80"]'
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
